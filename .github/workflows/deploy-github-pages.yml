name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted]
    
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify public folder
        run: |
          echo "Files to deploy:"
          ls -la public/
          echo "---"
          ls -la public/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true

      - name: Deployment Info
        run: |
          echo "✓ Deployment complete"
          echo "Site will be available at: https://promaterialai.github.io/website/"
          echo "Custom domain: promaterial.co.uk (after DNS config)"
